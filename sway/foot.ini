# foot configuration — https://codeberg.org/dnkl/foot
# Полный пример со всеми опциями и комментариями: /etc/xdg/foot/foot.ini

font=Noto Sans Mono:size=14:style=Medium

# Цветовая тема. Список: /usr/share/foot/themes/
# Сменить — поменять имя ниже и перечитать: pkill -USR1 foot
include=/usr/share/foot/themes/nord

[mouse]
hide-when-typing=yes
