# Idle/lock — overrides distro default (same filename wins via layered-include).
# Screen blanks first (no password), lock comes much later.
#   blank screen at 300s (5 min, DPMS off) — no password
#   lock at 600s (10 min) — password
# Two timeouts are independent; both count from continuous inactivity.
exec swayidle -w \
    timeout 300 'swaymsg "output * power off"' resume 'swaymsg "output * power on"' \
    timeout 600 'swaylock -f' \
    before-sleep 'swaylock -f' \
    lock 'swaylock -f' \
    unlock 'pkill -xu "$USER" -SIGUSR1 swaylock'
